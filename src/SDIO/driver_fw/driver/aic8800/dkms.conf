PACKAGE_NAME="aic8800-sdio"
PACKAGE_VERSION="2.0.1"
AUTOINSTALL="yes"

MAKE="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

BUILT_MODULE_NAME[0]="aic8800_bsp"
BUILT_MODULE_LOCATION[0]="aic8800_bsp/"
DEST_MODULE_LOCATION[0]="/kernel/drivers/net/wireless/aic8800/"

BUILT_MODULE_NAME[1]="aic8800_fdrv"
BUILT_MODULE_LOCATION[1]="aic8800_fdrv/"
DEST_MODULE_LOCATION[1]="/kernel/drivers/net/wireless/aic8800/"

BUILT_MODULE_NAME[2]="aic8800_btlpm"
BUILT_MODULE_LOCATION[2]="aic8800_btlpm/"
DEST_MODULE_LOCATION[2]="/kernel/drivers/net/wireless/aic8800/"
